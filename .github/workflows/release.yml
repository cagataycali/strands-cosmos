name: Release

# Publish to PyPI + create a GitHub Release when a version tag is pushed.
# Tagging is decoupled from merge: tag v0.3.0 (e.g. right after merging the PR)
# and this workflow builds the sdist+wheel, publishes to PyPI via Trusted
# Publishing (OIDC — no API token needed), and drafts a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Release
  id-token: write   # PyPI Trusted Publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify tag matches package version
        run: |
          PKG_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VER tag=$TAG_VER"
          test "$PKG_VER" = "$TAG_VER" || { echo "::error::tag $TAG_VER != pyproject version $PKG_VER"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
