name: Auto Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  auto-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Build package
      run: |
        python -m build

    - name: Guard against PyPI-forbidden direct-URL dependencies
      run: |
        python -c "
        import glob, zipfile, sys
        bad = []
        for whl in glob.glob('dist/*.whl'):
            z = zipfile.ZipFile(whl)
            md = [n for n in z.namelist() if n.endswith('METADATA')][0]
            bad += [l for l in z.read(md).decode().splitlines() if l.startswith('Requires-Dist') and ('git+' in l or ' @ ' in l)]
        if bad:
            print('::error::PyPI forbids direct-URL deps:'); [print(' ', b) for b in bad]; sys.exit(1)
        print('OK: no direct-URL dependencies in built metadata')
        "

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: strands-cosmos v${{ steps.get_version.outputs.version }}
        generate_release_notes: true
        body: |
          ## strands-cosmos v${{ steps.get_version.outputs.version }}

          NVIDIA Cosmos toolkit for Strands Agents — Cosmos 3 omnimodal (reasoning +
          generation) and Cosmos-Reason2 VLM.

          ### 📦 Installation
          ```bash
          pip install strands-cosmos==${{ steps.get_version.outputs.version }}
          ```

          ### 🔄 Upgrade
          ```bash
          pip install --upgrade strands-cosmos
          ```

          See [CHANGELOG.md](https://github.com/cagataycali/strands-cosmos/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false

    - name: Summary
      run: |
        echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** v${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **PyPI:** https://pypi.org/project/strands-cosmos/${{ steps.get_version.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
        echo "- **GitHub Release:** https://github.com/cagataycali/strands-cosmos/releases/tag/v${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
