site_name: Strands Cosmos
site_url: https://cagataycali.github.io/strands-cosmos
site_description: "NVIDIA Cosmos Reason VLM provider for Strands Agents — physical AI reasoning, video understanding, and embodied intelligence."
extra_css:
- stylesheets/extra.css?v=1
extra_javascript:
- https://unpkg.com/mermaid@10/dist/mermaid.min.js
nav:
- Home: index.md
- Getting Started:
  - Installation: getting-started/installation.md
  - Quickstart: getting-started/quickstart.md
- Guide:
  - Video Understanding: guide/video-understanding.md
  - Image Reasoning: guide/image-reasoning.md
  - Chain-of-Thought: guide/chain-of-thought.md
  - Tool Usage: guide/tool-usage.md
  - Jetson Deployment: guide/jetson.md
- Examples:
  - Overview: examples/overview.md
- Architecture: architecture.md
- API Reference: api-reference.md
theme:
  name: material
  logo: strands-cosmos-logo.svg
  favicon: strands-cosmos-logo.svg
  palette:
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - toc.follow
  - content.code.copy
  - content.tabs.link
  - navigation.top
  - navigation.tracking
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
- pymdownx.tabbed:
    alternate_style: true
- admonition
- pymdownx.details
- pymdownx.betterem
- pymdownx.mark
- pymdownx.caret
- pymdownx.tilde
- pymdownx.keys
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- attr_list
- md_in_html
- tables
- toc:
    permalink: true
